const cache = {};


function nettoyer(texte){

return (texte || "")

.toLowerCase()

.normalize("NFD")

.replace(/[\u0300-\u036f]/g,"");

}


function chargerFlux(blog,start){

return new Promise((resolve,reject)=>{


const callback =
"bloggerCallback" +
Date.now() +
Math.random().toString(36).substring(2);


const script=document.createElement("script");


window[callback]=function(data){


delete window[callback];

script.remove();


const articles = data.feed?.entry || [];


resolve({

    articles,

    total: Number(
        data.feed?.openSearch$totalResults?.$t || 0
    )

});


};


script.onerror=function(){


delete window[callback];

script.remove();


reject(
    new Error("Impossible de charger "+blog.nom)
);


};


script.src =

blog.url+

"/feeds/posts/default?alt=json-in-script"+

"&max-results="+MAX_RESULTS+

"&start-index="+start+

"&callback="+callback;


document.body.appendChild(script);


});


}



async function chargerTout(blog){


    // Utilise le cache si le blog a déjà été chargé

    if(cache[blog.nom]){

        return cache[blog.nom];

    }


    let tous = [];

    let index = 1;

    let total = Infinity;



    while(index <= total){


        const page = await chargerFlux(blog,index);


        tous.push(...page.articles);


        total = page.total;


        console.log(
            blog.nom,
            tous.length,
            "/",
            total
        );


        // Dernière page

        if(page.articles.length === 0){

            break;

        }


        index += MAX_RESULTS;


    }


    cache[blog.nom] = tous;


    return tous;


}



async function chercher(){


    const terme = document
        .getElementById("recherche")
        .value
        .trim();



    if(!terme){

        return;

    }



    const status =
        document.getElementById("status");


    const resultat =
        document.getElementById("resultats");



    resultat.innerHTML = "";


    status.innerHTML =
        "Chargement des blogs...";



    const listes = await Promise.all(

        blogs.map(blog => chargerTout(blog))

    );


    status.innerHTML =
        "Recherche en cours...";



    let html = "";



    const mots = nettoyer(terme)

    .split(/\s+/)

    .filter(m => m.length > 0);

    blogs.forEach((blog,index)=>{


        const articles = listes[index];


        const trouves = articles.filter(article=>{


            let titre =
                article.title?.$t || "";


            let contenu =
                article.summary?.$t || "";



            let texte =
                titre + " " + contenu;



            if(article.category){


                texte += " " +
                    article.category
                    .map(c=>c.term)
                    .join(" ");


            }



            const texteNettoye =
                nettoyer(texte);



            return mots.every(
                mot => texteNettoye.includes(mot)
            );


        });



        if(trouves.length){

html += `
<div class="resultat">

<div class="blog">
${blog.nom}
<span class="compteur">
(${trouves.length} résultat(s))
</span>
</div>

`;

}


trouves.forEach(article=>{


    let lien = "";


    if(article.link){

        article.link.forEach(l=>{

            if(l.rel==="alternate"){

                lien = l.href;

            }

        });

    }


    html += `

<div class="film">

<a href="${lien}" target="_blank">
${article.title?.$t || "Sans titre"}
</a>

</div>

`;

});


if(trouves.length){

html += `
</div>
`;

}



    });




    status.innerHTML =

        "Terminé — " +

        listes.reduce(
            (total,articles)=>
            total+articles.length,
            0
        ) +

        " articles indexés";




    resultat.innerHTML =

        html ||

        "<div class='resultat'>Aucun résultat.</div>";



}
